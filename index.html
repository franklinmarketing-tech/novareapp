<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fustat:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FCFCFD" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0F1A" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Novare" />
    <meta name="application-name" content="Novare" />
    <title>Novare — Consultoria Financeira</title>
    <meta name="description" content="Novare Consultoria Financeira: consultoria personalizada para organizar suas finanças, alcançar suas metas e investir com estratégia.">

    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/c3e7ad22-2361-4e69-b9d1-185c43366239">
    <meta property="og:title" content="Novare — Consultoria Financeira">
    <meta property="og:description" content="Novare Consultoria Financeira: consultoria personalizada para organizar suas finanças, alcançar suas metas e investir com estratégia.">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/c3e7ad22-2361-4e69-b9d1-185c43366239">
    <meta name="twitter:title" content="Novare — Consultoria Financeira">
    <meta name="twitter:description" content="Novare Consultoria Financeira: consultoria personalizada para organizar suas finanças, alcançar suas metas e investir com estratégia.">
  </head>

  <body>
    <script>
      // Anti-FOUC: apply theme before React mounts (default = light)
      (function () {
        try {
          var stored = localStorage.getItem('novare-theme');
          var theme = (stored === 'light' || stored === 'dark') ? stored : 'light';
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = theme;
          // Pinta o background imediato para evitar flash escuro no boot
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#0B0F1A' : '#FCFCFD';
        } catch (e) { /* ignore */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
