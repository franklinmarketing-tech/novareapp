  <body>
    <script>
      // Anti-FOUC: apply theme before React mounts (default = light)
      (function () {
        try {
          var stored = localStorage.getItem('novare-theme');
          var theme = (stored === 'light' || stored === 'dark') ? stored : 'light';
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = theme;
          // Pinta o background imediato para evitar flash escuro no boot
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#0B0F1A' : '#FCFCFD';
        } catch (e) { /* ignore */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
